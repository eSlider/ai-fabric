x-go-service-base: &go-service-base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      - BUILDKIT_INLINE_CACHE=1
  user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
  restart: unless-stopped
  network_mode: host
  depends_on:
    gitea:
      condition: service_healthy
  env_file:
    - .env
  develop:
    watch:
      - action: rebuild
        path: ./cmd
      - action: rebuild
        path: ./pkg
      - action: rebuild
        path: ./go.mod
      - action: rebuild
        path: ./go.sum
      - action: rebuild
        path: ./Dockerfile
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"
      labels: "service"

services:
  gitea:
    image: docker.gitea.com/gitea:1.24.6
    container_name: ai-fabric-gitea
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./var/gitea:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20

  gitea-runner:
    image: docker.io/gitea/act_runner:0.3.0
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    environment:
      CONFIG_FILE: "${CONFIG_FILE:-/tmp/runner/config.yaml}"
      GITEA_INSTANCE_URL: "${GITEA_INSTANCE_URL:-http://gitea:3000}"
      GITEA_RUNNER_NAME: "${GITEA_RUNNER_NAME:-ai-fabric-runner}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bin/gitea-runner-command.sh:/usr/local/bin/gitea-runner-command.sh:ro
    deploy:
      mode: replicated
      replicas: 2
    entrypoint: ["/bin/sh", "/usr/local/bin/gitea-runner-command.sh"]

  gitea-mcp:
    image: docker.gitea.com/gitea-mcp-server:latest
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: ["/app/gitea-mcp", "-t", "http", "-p", "8080"]

  issue-handler:
    <<: *go-service-base
    command: ["issue-handler"]
    labels:
      - "service=issue-handler"

  tg-bot:
    <<: *go-service-base
    command: ["tg-bot"]
    labels:
      - "service=tg-bot"

