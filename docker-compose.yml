services:
  gitea:
    image: docker.gitea.com/gitea:1.24.6
    container_name: ai-fabric-gitea
    restart: unless-stopped
    env_file:
      - .env
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__actions__ENABLED: "true"
      GITEA__database__DB_TYPE: sqlite3
      GITEA__database__PATH: /data/gitea/gitea.db
    ports:
      - "${GITEA_HTTP_PORT:-3000}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    volumes:
      - ./var/gitea:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20

  gitea-runner-1:
    image: docker.io/gitea/act_runner:0.2.11
    container_name: ai-fabric-runner-1
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GITEA_INSTANCE_URL: ${GITEA_INSTANCE_URL:-http://gitea:3000}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME_1:-ai-fabric-runner-1}
      CONFIG_FILE: /data/config.yaml
    volumes:
      - ./var/runner-1:/data
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "set -eu; if [ ! -f /data/config.yaml ]; then act_runner generate-config | sed 's#network: \"\"#network: \"ai-fabric_default\"#' > /data/config.yaml; fi; if [ -z \"$${GITEA_RUNNER_REGISTRATION_TOKEN:-}\" ] || [ \"$${GITEA_RUNNER_REGISTRATION_TOKEN}\" = \"replace-with-runner-token\" ]; then echo \"GITEA_RUNNER_REGISTRATION_TOKEN is not set. Waiting for a valid token in .env\"; exec sleep infinity; fi; if [ ! -f /data/.runner ]; then act_runner register --no-interactive --instance \"$${GITEA_INSTANCE_URL}\" --token \"$${GITEA_RUNNER_REGISTRATION_TOKEN}\" --name \"$${GITEA_RUNNER_NAME}\"; fi; exec act_runner daemon --config /data/config.yaml"

  gitea-runner-2:
    image: docker.io/gitea/act_runner:0.2.11
    container_name: ai-fabric-runner-2
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    environment:
      GITEA_INSTANCE_URL: ${GITEA_INSTANCE_URL:-http://gitea:3000}
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_NAME: ${GITEA_RUNNER_NAME_2:-ai-fabric-runner-2}
      CONFIG_FILE: /data/config.yaml
    volumes:
      - ./var/runner-2:/data
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "set -eu; if [ ! -f /data/config.yaml ]; then act_runner generate-config | sed 's#network: \"\"#network: \"ai-fabric_default\"#' > /data/config.yaml; fi; if [ -z \"$${GITEA_RUNNER_REGISTRATION_TOKEN:-}\" ] || [ \"$${GITEA_RUNNER_REGISTRATION_TOKEN}\" = \"replace-with-runner-token\" ]; then echo \"GITEA_RUNNER_REGISTRATION_TOKEN is not set. Waiting for a valid token in .env\"; exec sleep infinity; fi; if [ ! -f /data/.runner ]; then act_runner register --no-interactive --instance \"$${GITEA_INSTANCE_URL}\" --token \"$${GITEA_RUNNER_REGISTRATION_TOKEN}\" --name \"$${GITEA_RUNNER_NAME}\"; fi; exec act_runner daemon --config /data/config.yaml"

  issue-handler:
    image: docker.io/library/python:3.13-slim
    container_name: ai-fabric-issue-handler
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ISSUE_AGENT_BIN: /host-local-bin/agent
      PYTHONUNBUFFERED: "1"
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CURSOR_SETTINGS_DIR:-/home/ano/.cursor}:/root/.cursor
      - ${CURSOR_CONFIG_DIR:-/home/ano/.config/Cursor}:/root/.config/Cursor:ro
      - ${CURSOR_LOCAL_BIN_DIR:-/home/ano/.local/bin}:/host-local-bin:ro
      - ${CURSOR_AGENT_HOME_DIR:-/home/ano/.local/share/cursor-agent}:/home/ano/.local/share/cursor-agent:ro
    command:
      - /bin/sh
      - -c
      - "apt-get update >/dev/null && apt-get install -y --no-install-recommends bash git docker.io ca-certificates >/dev/null && rm -rf /var/lib/apt/lists/* && test -x /host-local-bin/agent && ./bin/issue_handler.sh"

