services:
  gitea:
    image: docker.gitea.com/gitea:1.24.6
    container_name: ai-fabric-gitea
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - ./var/gitea:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 5s
      retries: 20

  gitea-runner:
    image: docker.io/gitea/act_runner:0.3.0
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      mode: replicated
      replicas: 2
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "set -eu; mkdir -p /tmp/runner; if [ ! -f \"$$CONFIG_FILE\" ]; then act_runner generate-config | sed 's#network: \"\"#network: \"ai-fabric_default\"#' > \"$$CONFIG_FILE\"; fi; if [ -z \"$$GITEA_RUNNER_REGISTRATION_TOKEN\" ] || [ \"$$GITEA_RUNNER_REGISTRATION_TOKEN\" = \"replace-with-runner-token\" ]; then echo \"GITEA_RUNNER_REGISTRATION_TOKEN is not set. Waiting for a valid token in .env\"; exec sleep infinity; fi; if [ ! -f /tmp/runner/.runner ]; then act_runner register --no-interactive --instance \"$$GITEA_INSTANCE_URL\" --token \"$$GITEA_RUNNER_REGISTRATION_TOKEN\" --name \"$$GITEA_RUNNER_NAME-$$HOSTNAME\"; touch /tmp/runner/.runner; fi; exec act_runner daemon --config \"$$CONFIG_FILE\""

  gitea-mcp:
    image: docker.gitea.com/gitea-mcp-server:v1.0.1
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8080:8080"
    command: ["-t", "http", "--port", "8080"]

  # Python-based issue-handler and telegram-bot services were removed.
  # Go replacements will be added in dedicated follow-up change.

